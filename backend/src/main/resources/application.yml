spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/utms_db
    username: utms_user
    password: utms_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: dXRtcy1zZWNyZXQta2V5LWZvci1qd3Qtc2lnbmluZy11dG1zLWcwMi0yMDI2
  expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    edu.iztech.utms: DEBUG
    org.springframework.security: DEBUG