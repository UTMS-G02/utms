services:
  db:
    image: postgres:16-alpine
    container_name: utms-postgres
    environment:
      POSTGRES_DB: utms_db
      POSTGRES_USER: utms_user
      POSTGRES_PASSWORD: utms_pass
    ports:
      - "5432:5432"
    volumes:
      - utms_pgdata:/var/lib/postgresql/data

volumes:
  utms_pgdata: